services:
  rick-bot:
    image: ghcr.io/voody2506/rick-bot:latest
    build: .
    env_file: .env
    volumes:
      - ./memory:/app/memory
      - ./work:/app/work
      - ./skills:/app/skills
      - ./tokens:/app/tokens
      - ./pages:/app/pages
      - ${CLAUDE_HOME:-${HOME}/.claude}:/home/botuser/.claude
      - ${CLAUDE_JSON:-${HOME}/.claude.json}:/home/botuser/.claude.json
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./pages:/usr/share/nginx/html:ro
    restart: unless-stopped
