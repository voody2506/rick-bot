<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 32px 24px; text-align: center; border-bottom: 2px solid #00d4ff33; }
.header h1 { font-size: 28px; color: #00d4ff; margin-bottom: 8px; }
.header p { color: #888; font-size: 14px; }
.chart-container { max-width: 900px; margin: 32px auto; padding: 24px; background: #1a1a2e; border-radius: 16px; border: 1px solid #ffffff0d; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; max-width: 900px; margin: 16px auto; padding: 0 24px; }
.stat { background: #1a1a2e; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #ffffff0d; }
.stat-value { font-size: 32px; font-weight: 700; color: #00d4ff; }
.stat-label { font-size: 13px; color: #888; margin-top: 4px; }
.note { max-width: 900px; margin: 24px auto; padding: 24px; background: #1a1a2e; border-radius: 16px; color: #ccc; line-height: 1.6; border: 1px solid #ffffff0d; }
.footer { text-align: center; padding: 32px; color: #555; font-size: 12px; }
</style>
</head>
<body>
<div class="header">
  <h1>{{title}}</h1>
  <p>{{subtitle}}</p>
</div>
<div class="stats" id="stats"></div>
<div class="chart-container"><canvas id="chart"></canvas></div>
<div class="note" id="note"></div>
<div class="footer">Rick Sanchez C-137 — powered by interdimensional science</div>

<script>
const DATA = {{data}};

// Stats
if (DATA.stats) {
  const statsEl = document.getElementById('stats');
  DATA.stats.forEach(s => {
    statsEl.innerHTML += `<div class="stat"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`;
  });
}

// Chart
const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
  type: DATA.chart_type || 'line',
  data: {
    labels: DATA.labels,
    datasets: DATA.datasets.map((ds, i) => ({
      label: ds.label,
      data: ds.data,
      borderColor: ['#00d4ff', '#ff6384', '#ffcd56', '#4bc0c0'][i % 4],
      backgroundColor: ['#00d4ff22', '#ff638422', '#ffcd5622', '#4bc0c022'][i % 4],
      fill: ds.fill !== undefined ? ds.fill : true,
      tension: 0.3,
      borderWidth: 2,
    }))
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: '#ccc' } } },
    scales: {
      x: { ticks: { color: '#888' }, grid: { color: '#ffffff0d' } },
      y: { ticks: { color: '#888' }, grid: { color: '#ffffff0d' } }
    }
  }
});

// Note
if (DATA.note) {
  document.getElementById('note').textContent = DATA.note;
}
</script>
</body>
</html>
