<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; }

.portal-overlay { position: fixed; inset: 0; background: #0a0a15; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.8s; }
.portal-overlay.hide { opacity: 0; pointer-events: none; }
.portal { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(ellipse, #39ff14 0%, #00b894 30%, #006655 60%, transparent 70%); animation: spin 1.5s linear infinite, pulse 2s ease-in-out infinite; box-shadow: 0 0 60px #39ff1466, 0 0 120px #39ff1433, inset 0 0 40px #00000066; }
@keyframes spin { from { transform: rotate(0deg) scaleX(1); } 50% { transform: rotate(180deg) scaleX(0.85); } to { transform: rotate(360deg) scaleX(1); } }
@keyframes pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }
.portal-text { font-family: 'Bangers', cursive; color: #39ff14; font-size: 20px; margin-top: 24px; letter-spacing: 2px; }

.page { opacity: 0; transform: translateY(20px); transition: all 0.6s; }
.page.show { opacity: 1; transform: translateY(0); }
.header { padding: 32px 16px 16px; max-width: 720px; margin: 0 auto; }
.header h1 { font-family: 'Bangers', cursive; font-size: 28px; color: #39ff14; letter-spacing: 1px; text-shadow: 0 0 20px #39ff1433; }
.header p { color: #888; font-size: 13px; margin-top: 4px; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; max-width: 720px; margin: 16px auto; padding: 0 16px; }
.stat { background: #222244; padding: 16px; border-radius: 10px; text-align: center; border: 1px solid #333; }
.stat-value { font-size: 24px; font-weight: 700; color: #39ff14; font-family: 'Bangers', cursive; letter-spacing: 1px; }
.stat-label { font-size: 12px; color: #888; margin-top: 2px; }
.chart-container { max-width: 720px; margin: 16px auto; padding: 16px; background: #222244; border-radius: 12px; border: 1px solid #333; }
.note { max-width: 720px; margin: 16px auto; padding: 16px; background: #222244; border-radius: 12px; color: #bbb; line-height: 1.6; font-size: 14px; border-left: 3px solid #39ff14; }
.footer { text-align: center; padding: 24px; color: #444; font-size: 11px; font-family: 'Bangers', cursive; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="portal-overlay" id="po"><div class="portal"></div><div class="portal-text">CALCULATING ACROSS TIMELINES...</div></div>
<div class="page" id="page">
  <div class="header"><h1>{{title}}</h1><p>{{subtitle}}</p></div>
  <div class="stats" id="stats"></div>
  <div class="chart-container"><canvas id="chart"></canvas></div>
  <div class="note" id="note"></div>
  <div class="footer">RICK SANCHEZ C-137 — WUBBA LUBBA DUB DUB</div>
</div>
<script>
setTimeout(() => { document.getElementById('po').classList.add('hide'); document.getElementById('page').classList.add('show'); }, 2500);
const DATA = {{data}};
if (DATA.stats) {
  const s = document.getElementById('stats');
  DATA.stats.forEach(st => { s.innerHTML += `<div class="stat"><div class="stat-value">${st.value}</div><div class="stat-label">${st.label}</div></div>`; });
}
const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
  type: DATA.chart_type || 'line',
  data: {
    labels: DATA.labels,
    datasets: DATA.datasets.map((ds, i) => ({
      label: ds.label, data: ds.data,
      borderColor: ['#39ff14', '#ff6384', '#ffcd56', '#4bc0c0'][i % 4],
      backgroundColor: ['#39ff1418', '#ff638418', '#ffcd5618', '#4bc0c018'][i % 4],
      fill: ds.fill !== undefined ? ds.fill : true, tension: 0.3, borderWidth: 2,
    }))
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: '#ccc', font: { size: 12 } } } },
    scales: { x: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: '#ffffff08' } }, y: { ticks: { color: '#888', font: { size: 11 } }, grid: { color: '#ffffff08' } } }
  }
});
if (DATA.note) document.getElementById('note').textContent = DATA.note;
</script>
</body>
</html>
