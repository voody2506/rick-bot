<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; color: #222; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
.header { padding: 32px 20px 16px; max-width: 680px; margin: 0 auto; }
.header h1 { font-size: 22px; font-weight: 700; }
.header p { color: #999; font-size: 13px; margin-top: 2px; }
.stats { display: flex; gap: 8px; max-width: 680px; margin: 8px auto; padding: 0 20px; overflow-x: auto; }
.stat { background: #fafafa; padding: 14px 16px; border-radius: 10px; text-align: center; min-width: 120px; flex-shrink: 0; }
.stat-value { font-size: 22px; font-weight: 700; }
.stat-label { font-size: 11px; color: #999; margin-top: 2px; }
.chart-box { max-width: 680px; margin: 16px auto; padding: 0 20px; }
.note { max-width: 680px; margin: 16px auto; padding: 16px 20px; color: #666; line-height: 1.6; font-size: 14px; border-top: 1px solid #eee; }
.footer { text-align: center; padding: 20px; color: #ddd; font-size: 11px; }
</style>
</head>
<body>
<div class="header"><h1>{{title}}</h1><p>{{subtitle}}</p></div>
<div class="stats" id="stats"></div>
<div class="chart-box"><canvas id="chart"></canvas></div>
<div class="note" id="note"></div>
<div class="footer">Rick Sanchez C-137</div>
<script>
const D={{data}};
if(D.stats){const s=document.getElementById('stats');D.stats.forEach(st=>{s.innerHTML+=`<div class="stat"><div class="stat-value">${st.value}</div><div class="stat-label">${st.label}</div></div>`;});}
new Chart(document.getElementById('chart').getContext('2d'),{
  type:D.chart_type||'line',
  data:{labels:D.labels,datasets:D.datasets.map((ds,i)=>({
    label:ds.label,data:ds.data,
    borderColor:['#111','#e74c3c','#3498db','#2ecc71'][i%4],
    backgroundColor:['#11111108','#e74c3c08','#3498db08','#2ecc7108'][i%4],
    fill:ds.fill!==undefined?ds.fill:false,tension:0.3,borderWidth:2,pointRadius:3,
  }))},
  options:{responsive:true,
    plugins:{legend:{labels:{color:'#666',font:{size:12}}}},
    scales:{x:{ticks:{color:'#999',font:{size:11}},grid:{color:'#f0f0f0'}},y:{ticks:{color:'#999',font:{size:11}},grid:{color:'#f0f0f0'}}}
  }
});
if(D.note)document.getElementById('note').textContent=D.note;
</script>
</body>
</html>
