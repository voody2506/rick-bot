<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 32px 24px; text-align: center; border-bottom: 2px solid #00d4ff33; }
.header h1 { font-size: 28px; color: #00d4ff; margin-bottom: 8px; }
.header p { color: #888; font-size: 14px; }
.search { padding: 16px 24px; position: sticky; top: 0; background: #0f0f1a; z-index: 10; }
.search input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #333; background: #1a1a2e; color: #fff; font-size: 16px; outline: none; }
.search input:focus { border-color: #00d4ff; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 16px 24px; }
.card { background: #1a1a2e; border-radius: 16px; overflow: hidden; border: 1px solid #ffffff0d; transition: transform 0.2s, border-color 0.2s; }
.card:hover { transform: translateY(-4px); border-color: #00d4ff44; }
.card-img { width: 100%; height: 180px; object-fit: cover; background: #16213e; }
.card-body { padding: 16px; }
.card-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
.card-desc { font-size: 14px; color: #aaa; line-height: 1.5; margin-bottom: 12px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.tag { padding: 4px 10px; border-radius: 20px; font-size: 12px; background: #00d4ff15; color: #00d4ff; border: 1px solid #00d4ff33; }
.card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid #ffffff0d; }
.price { font-size: 20px; font-weight: 700; color: #00d4ff; }
.rating { color: #ffd700; font-size: 14px; }
.footer { text-align: center; padding: 32px; color: #555; font-size: 12px; }
.counter { padding: 8px 24px; color: #666; font-size: 13px; }
</style>
</head>
<body>
<div class="header">
  <h1>{{title}}</h1>
  <p>{{subtitle}}</p>
</div>
<div class="search">
  <input type="text" id="searchInput" placeholder="Поиск..." oninput="filterCards()">
</div>
<div class="counter" id="counter"></div>
<div class="grid" id="grid"></div>
<div class="footer">Rick Sanchez C-137 — powered by interdimensional science</div>

<script>
const DATA = {{data}};

function renderCards(items) {
  const grid = document.getElementById('grid');
  document.getElementById('counter').textContent = `Найдено: ${items.length}`;
  grid.innerHTML = items.map(item => `
    <div class="card">
      ${item.image ? `<img class="card-img" src="${item.image}" alt="${item.title}" onerror="this.style.display='none'">` : ''}
      <div class="card-body">
        <div class="card-title">${item.title}</div>
        <div class="card-desc">${item.description || ''}</div>
        ${item.tags ? `<div class="card-tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
        <div class="card-footer">
          ${item.price ? `<span class="price">${item.price}</span>` : '<span></span>'}
          ${item.rating ? `<span class="rating">${'★'.repeat(Math.round(item.rating))}${'☆'.repeat(5-Math.round(item.rating))} ${item.rating}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = DATA.filter(item =>
    item.title.toLowerCase().includes(q) ||
    (item.description || '').toLowerCase().includes(q) ||
    (item.tags || []).some(t => t.toLowerCase().includes(q))
  );
  renderCards(filtered);
}

renderCards(DATA);
</script>
</body>
</html>
