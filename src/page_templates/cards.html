<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; color: #222; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
.header { padding: 32px 20px 16px; max-width: 680px; margin: 0 auto; }
.header h1 { font-size: 22px; font-weight: 700; }
.header p { color: #999; font-size: 13px; margin-top: 2px; }
.search { padding: 4px 20px 12px; max-width: 680px; margin: 0 auto; position: sticky; top: 0; background: #fff; z-index: 10; }
.search input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #e0e0e0; font-size: 15px; outline: none; background: #fafafa; }
.search input:focus { border-color: #bbb; background: #fff; }
.counter { padding: 0 20px 6px; max-width: 680px; margin: 0 auto; color: #bbb; font-size: 12px; }
.list { max-width: 680px; margin: 0 auto; padding: 0 20px 32px; }
.card { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
.card:last-child { border-bottom: none; }
.card-img { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; background: #f5f5f5; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #ccc; }
.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 15px; font-weight: 600; }
.card-desc { font-size: 13px; color: #888; margin-top: 2px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: all 0.2s; }
.card.open .card-desc { -webkit-line-clamp: unset; display: block; }
.card-toggle { font-size: 12px; color: #bbb; cursor: pointer; margin-top: 4px; }
.card-toggle:hover { color: #666; }
.card-meta { display: flex; gap: 8px; align-items: center; margin-top: 6px; flex-wrap: wrap; }
.tag { padding: 2px 7px; border-radius: 4px; font-size: 11px; background: #f5f5f5; color: #666; }
.price { font-size: 14px; font-weight: 700; }
.rating { color: #f5a623; font-size: 12px; }
.footer { text-align: center; padding: 20px; color: #ddd; font-size: 11px; }
</style>
</head>
<body>
<div class="header"><h1>{{title}}</h1><p>{{subtitle}}</p></div>
<div class="search"><input type="text" id="si" placeholder="Поиск..." oninput="f()"></div>
<div class="counter" id="c"></div>
<div class="list" id="list"></div>
<div class="footer">Rick Sanchez C-137</div>
<script>
const D={{data}};
function r(items){
  document.getElementById('c').textContent=items.length+' шт.';
  document.getElementById('list').innerHTML=items.map(i=>`<div class="card">
    ${i.image?`<img class="card-img" src="${i.image}" onerror="this.outerHTML='<div class=card-img>📦</div>'">`:'<div class="card-img">📦</div>'}
    <div class="card-body">
      <div class="card-title">${i.title}</div>
      <div class="card-desc">${i.description||''}</div>
      ${(i.description||'').length > 80 ? '<div class="card-toggle" onclick="this.parentElement.parentElement.classList.toggle(\'open\');this.textContent=this.textContent===\'Ещё\'?\'Свернуть\':\'Ещё\'">Ещё</div>' : ''}
      <div class="card-meta">
        ${i.price?`<span class="price">${i.price}</span>`:''}
        ${i.rating?`<span class="rating">${'★'.repeat(Math.round(i.rating))} ${i.rating}</span>`:''}
        ${(i.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
    </div>
  </div>`).join('');
}
function f(){const q=document.getElementById('si').value.toLowerCase();r(D.filter(i=>i.title.toLowerCase().includes(q)||(i.description||'').toLowerCase().includes(q)||(i.tags||[]).some(t=>t.toLowerCase().includes(q))));}
r(D);
</script>
</body>
</html>
