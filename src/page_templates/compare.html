<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 32px 24px; text-align: center; border-bottom: 2px solid #00d4ff33; }
.header h1 { font-size: 28px; color: #00d4ff; margin-bottom: 8px; }
.header p { color: #888; font-size: 14px; }
.compare { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 0; padding: 24px; max-width: 1200px; margin: 0 auto; }
.item { background: #1a1a2e; padding: 24px; border: 1px solid #ffffff0d; }
.item:first-child { border-radius: 16px 0 0 16px; }
.item:last-child { border-radius: 0 16px 16px 0; }
.item-name { font-size: 22px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 2px solid #00d4ff33; }
.item img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 16px; background: #16213e; border-radius: 8px; }
.spec-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ffffff0d; }
.spec-label { color: #888; font-size: 14px; }
.spec-value { color: #fff; font-weight: 500; font-size: 14px; text-align: right; max-width: 60%; }
.winner { color: #00d4ff; }
.verdict { max-width: 1200px; margin: 24px auto; padding: 24px; background: #1a1a2e; border-radius: 16px; border: 1px solid #00d4ff33; }
.verdict h2 { color: #00d4ff; margin-bottom: 12px; }
.verdict p { line-height: 1.6; color: #ccc; }
.footer { text-align: center; padding: 32px; color: #555; font-size: 12px; }
</style>
</head>
<body>
<div class="header">
  <h1>{{title}}</h1>
  <p>{{subtitle}}</p>
</div>
<div class="compare" id="compare"></div>
<div class="verdict" id="verdict"></div>
<div class="footer">Rick Sanchez C-137 — powered by interdimensional science</div>

<script>
const DATA = {{data}};
const VERDICT = {{verdict}};

const compare = document.getElementById('compare');
DATA.items.forEach(item => {
  compare.innerHTML += `
    <div class="item">
      <div class="item-name">${item.name}</div>
      ${item.image ? `<img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'">` : ''}
      ${item.specs.map(s => `
        <div class="spec-row">
          <span class="spec-label">${s.label}</span>
          <span class="spec-value ${s.winner ? 'winner' : ''}">${s.value}</span>
        </div>
      `).join('')}
    </div>
  `;
});

document.getElementById('verdict').innerHTML = `<h2>Вердикт</h2><p>${VERDICT}</p>`;
</script>
</body>
</html>
