<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; }

.portal-overlay { position: fixed; inset: 0; background: #0a0a15; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.8s; }
.portal-overlay.hide { opacity: 0; pointer-events: none; }
.portal { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(ellipse, #39ff14 0%, #00b894 30%, #006655 60%, transparent 70%); animation: spin 1.5s linear infinite, pulse 2s ease-in-out infinite; box-shadow: 0 0 60px #39ff1466, 0 0 120px #39ff1433, inset 0 0 40px #00000066; }
@keyframes spin { from { transform: rotate(0deg) scaleX(1); } 50% { transform: rotate(180deg) scaleX(0.85); } to { transform: rotate(360deg) scaleX(1); } }
@keyframes pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }
.portal-text { font-family: 'Bangers', cursive; color: #39ff14; font-size: 20px; margin-top: 24px; letter-spacing: 2px; }

.page { opacity: 0; transform: translateY(20px); transition: all 0.6s; }
.page.show { opacity: 1; transform: translateY(0); }
.header { padding: 32px 24px 16px; max-width: 960px; margin: 0 auto; }
.header h1 { font-family: 'Bangers', cursive; font-size: 32px; color: #39ff14; letter-spacing: 1px; text-shadow: 0 0 20px #39ff1433; }
.header p { color: #888; font-size: 13px; margin-top: 4px; }
.compare { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 0; padding: 24px; max-width: 960px; margin: 0 auto; }
.item { background: #222244; padding: 24px; border: 1px solid #333; }
.item:first-child { border-radius: 12px 0 0 12px; }
.item:last-child { border-radius: 0 12px 12px 0; }
@media (max-width: 600px) { .item { border-radius: 12px !important; } .compare { gap: 8px; } }
.item-name { font-family: 'Bangers', cursive; font-size: 22px; color: #fff; text-align: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 2px solid #39ff1433; letter-spacing: 1px; }
.spec-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ffffff08; }
.spec-label { color: #888; font-size: 13px; }
.spec-value { color: #ddd; font-weight: 500; font-size: 13px; text-align: right; max-width: 60%; }
.winner { color: #39ff14; font-weight: 700; }
.verdict { max-width: 960px; margin: 20px auto; padding: 20px; background: #222244; border-radius: 12px; border-left: 3px solid #39ff14; }
.verdict h2 { font-family: 'Bangers', cursive; color: #39ff14; margin-bottom: 8px; letter-spacing: 1px; }
.verdict p { line-height: 1.6; color: #bbb; font-size: 14px; }
.footer { text-align: center; padding: 24px; color: #444; font-size: 11px; font-family: 'Bangers', cursive; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="portal-overlay" id="po"><div class="portal"></div><div class="portal-text">COMPARING ACROSS DIMENSIONS...</div></div>
<div class="page" id="page">
  <div class="header"><h1>{{title}}</h1><p>{{subtitle}}</p></div>
  <div class="compare" id="compare"></div>
  <div class="verdict" id="verdict"></div>
  <div class="footer">RICK SANCHEZ C-137 — WUBBA LUBBA DUB DUB</div>
</div>
<script>
setTimeout(() => { document.getElementById('po').classList.add('hide'); document.getElementById('page').classList.add('show'); }, 2500);
const DATA = {{data}};
const VERDICT = {{verdict}};
const c = document.getElementById('compare');
DATA.items.forEach(item => {
  c.innerHTML += `<div class="item"><div class="item-name">${item.name}</div>
    ${item.specs.map(s => `<div class="spec-row"><span class="spec-label">${s.label}</span><span class="spec-value ${s.winner ? 'winner' : ''}">${s.value}</span></div>`).join('')}</div>`;
});
document.getElementById('verdict').innerHTML = `<h2>Вердикт</h2><p>${VERDICT}</p>`;
</script>
</body>
</html>
