<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; color: #222; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
.header { padding: 32px 20px 16px; max-width: 680px; margin: 0 auto; }
.header h1 { font-size: 22px; font-weight: 700; }
.header p { color: #999; font-size: 13px; margin-top: 2px; }
.compare { max-width: 680px; margin: 0 auto; padding: 0 20px; }
table { width: 100%; border-collapse: collapse; }
th { padding: 12px 8px; text-align: left; font-size: 16px; font-weight: 700; border-bottom: 2px solid #111; }
td { padding: 10px 8px; font-size: 13px; border-bottom: 1px solid #f0f0f0; color: #555; }
td:first-child { color: #999; font-size: 12px; width: 30%; }
.win { color: #111; font-weight: 600; }
.verdict { max-width: 680px; margin: 20px auto; padding: 16px 20px; border-top: 1px solid #eee; }
.verdict h2 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.verdict p { font-size: 14px; color: #666; line-height: 1.6; }
.footer { text-align: center; padding: 20px; color: #ddd; font-size: 11px; }
</style>
</head>
<body>
<div class="header"><h1>{{title}}</h1><p>{{subtitle}}</p></div>
<div class="compare"><table id="tbl"></table></div>
<div class="verdict" id="verdict"></div>
<div class="footer">Rick Sanchez C-137</div>
<script>
const D={{data}};
const V={{verdict}};
const t=document.getElementById('tbl');
const items=D.items;
// Header
t.innerHTML=`<tr><th></th>${items.map(i=>`<th>${i.name}</th>`).join('')}</tr>`;
// Specs
const specCount=items[0].specs.length;
for(let s=0;s<specCount;s++){
  t.innerHTML+=`<tr><td>${items[0].specs[s].label}</td>${items.map(i=>`<td class="${i.specs[s].winner?'win':''}">${i.specs[s].value}</td>`).join('')}</tr>`;
}
document.getElementById('verdict').innerHTML=`<h2>Итог</h2><p>${V}</p>`;
</script>
</body>
</html>
