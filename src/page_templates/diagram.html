<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; color: #222; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
.header { padding: 32px 20px 16px; max-width: 900px; margin: 0 auto; }
.header h1 { font-size: 22px; font-weight: 700; }
.header p { color: #999; font-size: 13px; margin-top: 2px; }
.diagram-container { max-width: 900px; margin: 16px auto; padding: 16px 20px; overflow-x: auto; }
.diagram-container svg { max-width: 100%; height: auto; }
.note { max-width: 900px; margin: 16px auto; padding: 16px 20px; color: #666; line-height: 1.6; font-size: 14px; border-top: 1px solid #eee; }
.footer { text-align: center; padding: 20px; color: #ddd; font-size: 11px; }
</style>
</head>
<body>
<div class="header"><h1>{{title}}</h1><p>{{subtitle}}</p></div>
<div class="diagram-container"><pre class="mermaid">{{diagram}}</pre></div>
<div class="note" id="note"></div>
<div class="footer">Rick Sanchez C-137</div>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
mermaid.initialize({ startOnLoad: true, theme: 'default', securityLevel: 'loose' });
const note = {{note}};
if (note) document.getElementById('note').textContent = note;
</script>
</body>
</html>
